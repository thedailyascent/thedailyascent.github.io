<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #faf7f2;
      color: #2c1f14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 520px;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 600;
      color: #5c4033;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    p {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.8;
      color: #5c4a38;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      background: #edf0e8;
      color: #6b7c5c;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 999px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #c4a882;
      margin: 2rem auto;
      border-radius: 2px;
    }

    .footer-note {
      font-size: 0.8rem;
      color: #c4a882;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🛠️</div>
    <h1>Something great is on its way</h1>
    <p>This page is currently under construction. Check back soon — we're putting the finishing touches on something worth waiting for.</p>
    <span class="badge">Coming Soon</span>
    <div class="divider"></div>
    <p class="footer-note">© 2026 The Daily Ascent</p>
  </div>
</body>
</html>
